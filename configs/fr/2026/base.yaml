meta:
  country: "fr"
  year: 2026
  currency: "EUR"
  version: "1.0.0"
  sources:
    - url: "https://impots.dispofi.fr/bareme-impot"
      description: "Barème impôt sur le revenu 2026 (revenus 2025) — revalorisation de 0,9%"
      retrieved_at: "2026-02-22"
    - url: "https://www.legifiscal.fr/actualites-fiscales/4396-plf-2026-nouveau-bareme-impot-revenu-issu-article-49-3.html"
      description: "PLF 2026 : nouveau barème issu de l'article 49-3 — tranches revalorisées de 0,9%"
      retrieved_at: "2026-02-22"
    - url: "https://www.service-public.gouv.fr/particuliers/actualites/A15386"
      description: "Plafond annuel de la Sécurité sociale 2026 : €48,060 (+2% vs 2025)"
      retrieved_at: "2026-02-22"
    - url: "https://www.urssaf.fr/accueil/outils-documentation/taux-baremes/taux-cotisations-secteur-prive.html"
      description: "Taux de cotisations sociales salariales 2026"
      retrieved_at: "2026-02-22"
    - url: "https://www.bdor.fr/actualites-or/impots-2026-frais-reels-ou-abattement-de-10-le-choix-qui-change-votre-facture-fiscale"
      description: "Abattement frais professionnels 2026 : min 509€, max 14 555€"
      retrieved_at: "2026-02-22"
  updated_at: "2026-02-22"
  notes: |
    France 2026 — Impôt sur le revenu calculé sur les revenus 2025.
    Loi de finances pour 2026 adoptée le 2 février 2026 avec revalorisation
    des tranches de 0,9% (compromis abandonant le gel initialement prévu).

    Principaux changements par rapport à 2025 :
    - Tranches du barème revalorisées de 0,9%
    - Plafond annuel de la Sécurité sociale (PASS) porté à 48 060 € (+2%)
    - Abattement frais professionnels 10% : min 509 €, max 14 555 €

    Le système fiscal comprend :
    - Impôt progressif sur le revenu avec quotient familial (splitting familial)
    - Charges sociales élevées (CSG et CRDS) sur les revenus salariaux
    - Cotisations salariales de sécurité sociale (retraite, santé)
    - Calcul familial par division du revenu par le nombre de "parts"

notices:
  - id: "gross_salary_info"
    title: "Annual Gross Salary"
    body: |
      Enter your total annual gross salary (salaire brut annuel) before any deductions.
      This should include all regular compensation and bonuses.
    severity: "info"

  - id: "quotient_familial_info"
    title: "Quotient Familial (Family Splitting)"
    body: |
      France uses a family-based tax system where income is divided by "parts fiscales":
      - Single: 1 part
      - Married/PACS: 2 parts
      - First two children: +0.5 part each
      - Third+ children: +1 part each

      This system significantly reduces taxes for families with children.
    severity: "info"

  - id: "social_charges_notice"
    title: "Social Charges (CSG/CRDS)"
    body: |
      French employees pay significant social charges:
      - CSG (Contribution Sociale Généralisée): 9.2% (6.8% deductible + 2.4% non-deductible)
      - CRDS (Contribution au Remboursement de la Dette Sociale): 0.5%

      These are calculated on 98.25% of gross salary (1.75% abatement).
    severity: "info"

  - id: "net_vs_net_imposable"
    title: "Net Salary vs Taxable Income"
    body: |
      This calculator shows net salary after all deductions.
      Note that French tax notices distinguish between:
      - Net à payer (take-home pay after all deductions)
      - Revenu net imposable (taxable income, which is higher)
    severity: "info"

inputs:
  gross_annual:
    type: number
    required: true
    min: 0
    label: "Annual Gross Salary"
    description: "Your total yearly salary before deductions (salaire brut)"

  filing_status:
    type: enum
    required: true
    default: "single"
    label: "Filing Status (Situation familiale)"
    options:
      single:
        label: "Single (Célibataire)"
        description: "Unmarried, divorced, or widowed"
        base_parts: 1
      married:
        label: "Married/PACS (Marié ou Pacsé)"
        description: "Married or in civil partnership"
        base_parts: 2

  children:
    type: number
    required: false
    default: 0
    min: 0
    max: 10
    effect: reduces_tax
    label: "Number of Dependent Children"
    description: "Children under 18 or students under 25 living with you"

parameters:
  # 2026 Income tax brackets (applied per part fiscale, on revenus 2025)
  # Revalorisation de 0,9% par la loi de finances 2026
  # Source: PLF 2026 article 49-3, adopté le 2 février 2026
  income_tax_brackets:
    - threshold: 0
      rate: 0
    - threshold: 11600
      rate: 0.11
    - threshold: 29579
      rate: 0.30
    - threshold: 84577
      rate: 0.41
    - threshold: 181917
      rate: 0.45

  # Social security contributions (employee portion only)
  # Pension insurance (retraite de base) — unchanged from 2025
  pension_rate_uncapped: 0.004  # 0.4% on total salary
  pension_rate_capped: 0.069    # 6.9% up to ceiling

  # Social security ceiling (Plafond annuel de la Sécurité Sociale — PASS)
  # 2026: €48,060/year (€4,005/month), +2% vs 2025 (€48,048)
  # Source: Arrêté du 22 décembre 2025
  social_security_ceiling: 48060

  # CSG (Contribution Sociale Généralisée) — unchanged from 2025
  csg_rate_deductible: 0.068    # 6.8% deductible from taxable income
  csg_rate_nondeductible: 0.024 # 2.4% non-deductible

  # CRDS (Contribution au Remboursement de la Dette Sociale) — unchanged
  crds_rate: 0.005              # 0.5%

  # CSG/CRDS base calculation (98.25% of gross) — unchanged
  csg_crds_rate: 0.9825         # 1.75% abatement

  # Standard 10% professional expenses deduction for taxable income
  # 2026 values: min 509€ (+19€ vs 2025), max 14,555€ (+384€ vs 2025)
  professional_expenses_rate: 0.10
  professional_expenses_min: 509    # Minimum deduction (was 490 in 2025)
  professional_expenses_max: 14555  # Maximum deduction for 2026 (was 14,171 in 2025)

calculations:
  # ====================
  # SOCIAL CONTRIBUTIONS
  # ====================

  # CSG/CRDS Base (98.25% of gross salary)
  - id: csg_crds_base
    type: percent_of
    base: "@gross_annual"
    rate: "$csg_crds_rate"

  # CSG Deductible (6.8% of base)
  - id: csg_deductible
    type: percent_of
    base: "$csg_crds_base"
    rate: "$csg_rate_deductible"
    category: contribution
    label: "CSG Deductible"
    description: "6.8% deductible social contribution on 98.25% of gross"

  # CSG Non-Deductible (2.4% of base)
  - id: csg_nondeductible
    type: percent_of
    base: "$csg_crds_base"
    rate: "$csg_rate_nondeductible"
    category: contribution
    label: "CSG Non-Deductible"
    description: "2.4% non-deductible social contribution on 98.25% of gross"

  # CRDS (0.5% of base)
  - id: crds
    type: percent_of
    base: "$csg_crds_base"
    rate: "$crds_rate"
    category: contribution
    label: "CRDS"
    description: "0.5% debt reduction contribution on 98.25% of gross"

  # Pension contribution - uncapped portion (0.4% on total)
  - id: pension_uncapped
    type: percent_of
    base: "@gross_annual"
    rate: "$pension_rate_uncapped"

  # Pension contribution - capped portion (6.9% up to ceiling)
  - id: pension_capped_base
    type: min
    values:
      - "@gross_annual"
      - "$social_security_ceiling"

  - id: pension_capped
    type: percent_of
    base: "$pension_capped_base"
    rate: "$pension_rate_capped"

  # Total pension contribution
  - id: pension_contribution
    type: sum
    values:
      - "$pension_uncapped"
      - "$pension_capped"
    category: contribution
    label: "Pension Insurance (Assurance Vieillesse)"
    description: "0.4% on total + 6.9% up to €48,060"

  # Total social contributions (for net salary calculation)
  - id: total_contributions
    type: sum
    values:
      - "$csg_deductible"
      - "$csg_nondeductible"
      - "$crds"
      - "$pension_contribution"

  # ====================
  # TAXABLE INCOME
  # ====================

  # Net salary before income tax (gross - all social contributions)
  - id: net_before_tax
    type: sub
    values:
      - "@gross_annual"
      - "$total_contributions"

  # Professional expenses deduction (10% of gross, with min/max)
  - id: professional_expenses_uncapped
    type: percent_of
    base: "@gross_annual"
    rate: "$professional_expenses_rate"

  - id: professional_expenses
    type: max
    values:
      - type: min
        values:
          - "$professional_expenses_uncapped"
          - "$professional_expenses_max"
      - "$professional_expenses_min"

  # Taxable income = Gross - Deductible CSG - Professional expenses
  - id: taxable_income_before_qf
    type: sub
    values:
      - "@gross_annual"
      - type: sum
        values:
          - "$csg_deductible"
          - "$professional_expenses"

  # ====================
  # QUOTIENT FAMILIAL
  # ====================

  # Calculate number of fiscal parts based on status and children
  - id: base_parts
    type: switch
    on: "@filing_status"
    cases:
      single: 1
      married: 2

  # Additional parts for children
  # First 2 children: 0.5 part each
  # 3rd+ children: 1 part each
  - id: children_parts
    type: conditional
    condition:
      type: gt
      left: "@children"
      right: 2
    then:
      type: sum
      values:
        - 1.0  # First two children = 1 part total
        - type: sub
          values:
            - "@children"
            - 2
    else:
      type: mul
      values:
        - "@children"
        - 0.5

  # Total fiscal parts
  - id: total_parts
    type: sum
    values:
      - "$base_parts"
      - "$children_parts"

  # ====================
  # INCOME TAX
  # ====================

  # Family quotient: divide income by family parts
  - id: income_tax_quotient
    type: div
    values:
      - "$taxable_income_before_qf"
      - "$total_parts"

  # Apply progressive tax brackets to quotient
  - id: income_tax_on_quotient
    type: bracket_tax
    base: "$income_tax_quotient"
    brackets: "$income_tax_brackets"

  # Multiply back by family parts to get total tax
  - id: income_tax
    type: mul
    values:
      - "$income_tax_on_quotient"
      - "$total_parts"
    category: income_tax
    label: "Income Tax (Impôt sur le Revenu)"
    description: "Progressive tax with family quotient system (quotient familial)"

  # ====================
  # TOTALS
  # ====================

  # Total deductions (contributions + income tax)
  - id: total_deductions
    type: sum
    values:
      - "$total_contributions"
      - "$income_tax"

  # Net annual salary (take-home pay)
  - id: net_annual
    type: sub
    values:
      - "@gross_annual"
      - "$total_deductions"

outputs:
  gross: "@gross_annual"
  net: "$net_annual"

  effective_rate:
    type: div
    values:
      - "$total_deductions"
      - "@gross_annual"

  breakdown:
    taxes:
      - "$income_tax"
    contributions:
      - "$csg_deductible"
      - "$csg_nondeductible"
      - "$crds"
      - "$pension_contribution"
