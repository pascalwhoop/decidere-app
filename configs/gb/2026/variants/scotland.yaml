meta:
  variant: "scotland"
  label: "Scotland"
  description: |
    Scottish income tax rates for the 2026/27 tax year. Scotland sets its own
    income tax rates and bands for non-savings, non-dividend income (including
    employment income). Scottish taxpayers have six tax bands instead of three,
    with different rates and thresholds compared to the rest of the UK.

    For 2026/27, the Starter and Basic rate band thresholds increased by 7.4%
    above inflation, while Higher, Advanced and Top rate thresholds remain frozen.
    National Insurance rates and thresholds remain UK-wide and are unchanged.
  base: "../base.yaml"
  sources:
    - url: "https://www.gov.scot/publications/scottish-income-tax-technical-factsheet/"
      description: "Scottish Income Tax 2026 to 2027: technical factsheet"
      retrieved_at: "2026-02-28"
    - url: "https://www.gov.uk/guidance/rates-and-thresholds-for-employers-2026-to-2027"
      description: "Official HMRC rates and thresholds for employers 2026 to 2027 (includes Scottish rates)"
      retrieved_at: "2026-02-28"
    - url: "https://www.dentons.com/en/insights/articles/2026/january/13/scottish-budget-2026-2027"
      description: "Scottish Budget: 2026-2027 analysis"
      retrieved_at: "2026-02-28"
  updated_at: "2026-02-28"
  notes: |
    Scottish income tax rates and bands for 2026/27:
    - Starter rate: 19% on taxable income £0-£3,967
    - Basic rate: 20% on taxable income £3,968-£16,956
    - Intermediate rate: 21% on taxable income £16,957-£31,092
    - Higher rate: 42% on taxable income £31,093-£62,430
    - Advanced rate: 45% on taxable income £62,431-£112,570
    - Top rate: 48% on taxable income over £112,570

    Changes from 2025/26:
    - Starter rate band increased from £2,827 to £3,967 (up 40.3%)
    - Basic rate band limit increased from £14,921 to £16,956 (up 13.6%)
    - Combined effect: Basic and Intermediate rate thresholds rose by 7.4%
    - Higher, Advanced and Top rate thresholds: unchanged (frozen)
    - All rates: unchanged

    Key differences vs rest of UK (England/Wales/NI):
    - Scotland has 6 tax bands vs 3 in the rest of UK
    - Lower earners (under ~£29,500) pay slightly less tax in Scotland
    - Higher earners pay more: 42% higher rate (vs 40%), 48% top rate (vs 45%)
    - The £100k tax trap still applies in Scotland (PA taper is UK-wide)

    National Insurance is NOT devolved - same rates apply across the UK.

notices:
  - id: "scotland_rates"
    title: "Scottish Income Tax Rates Apply"
    body: |
      You are using the Scottish income tax variant. Scotland has its own income
      tax rates and bands that differ from the rest of the UK. Scottish taxpayers
      have six tax bands (19%, 20%, 21%, 42%, 45%, 48%) compared to three bands
      in England, Wales and Northern Ireland (20%, 40%, 45%).

      National Insurance rates and thresholds are the same across the whole of the UK.

      For 2026/27, the Starter and Basic rate band thresholds were increased by
      7.4%, meaning lower earners in Scotland pay slightly less than in 2025/26.
    severity: "info"

parameters:
  # Scottish income tax brackets on TAXABLE income (after personal allowance)
  # Gross income thresholds assume standard PA of £12,570:
  #   Starter: Gross £12,571-£16,537 => Taxable £0-£3,967 (19%)
  #   Basic: Gross £16,538-£29,526 => Taxable £3,968-£16,956 (20%)
  #   Intermediate: Gross £29,527-£43,662 => Taxable £16,957-£31,092 (21%)
  #   Higher: Gross £43,663-£75,000 => Taxable £31,093-£62,430 (42%)
  #   Advanced: Gross £75,001-£125,140 => Taxable £62,431-£112,570 (45%)
  #   Top: Gross over £125,140 => Taxable over £112,570 (48%)
  income_tax_brackets:
    - threshold: 0
      rate: 0.19      # Starter rate
    - threshold: 3967
      rate: 0.20      # Basic rate
    - threshold: 16956
      rate: 0.21      # Intermediate rate
    - threshold: 31092
      rate: 0.42      # Higher rate
    - threshold: 62430
      rate: 0.45      # Advanced rate
    - threshold: 112570
      rate: 0.48      # Top rate
