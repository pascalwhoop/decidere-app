meta:
  country: "ch"
  year: 2024
  currency: "CHF"
  version: "1.0.0"
  sources:
    - url: "https://www.estv.admin.ch/estv/en/home/federal-direct-tax.html"
      description: "Swiss Federal Tax Administration - Direct Federal Tax"
      retrieved_at: "2024-01-22"
    - url: "https://www.ahv-iv.ch/p/2.01.f"
      description: "AVS/AI/APG social security contribution rates 2024"
      retrieved_at: "2024-01-22"
    - url: "https://finaro.ch/en/Steueranderungen"
      description: "Tax Changes 2024 in Switzerland"
      retrieved_at: "2024-01-22"
    - url: "https://www.moneyland.ch/en/taxes-highest-lowest-municipalities-switzerland"
      description: "Canton and municipal tax rates comparison"
      retrieved_at: "2024-01-22"
    - url: "https://taxsummaries.pwc.com/switzerland/corporate/taxes-on-corporate-income"
      description: "PWC Tax Summaries - Switzerland overview"
      retrieved_at: "2024-01-22"
  updated_at: "2024-01-22"
  notes: |
    Switzerland has a complex three-level tax system: federal, cantonal, and municipal.
    Federal tax rates are progressive up to 11.5% maximum.
    Cantonal and municipal taxes vary significantly by location, using multiplier systems.
    This configuration provides federal taxes and example cantonal rates for major cantons.

notices:
  - id: "multi_level_taxation"
    title: "Three-Level Tax System"
    body: |
      Switzerland taxes income at three levels: federal, cantonal (state), and municipal (city).
      Total tax burden varies significantly by location. This calculator includes federal tax
      and representative canton/municipal rates. Your actual tax may differ based on your
      specific municipality within the canton.
    severity: "info"

  - id: "social_security"
    title: "Social Security Contributions"
    body: |
      Swiss employees contribute to AVS/AI/APG (old-age, disability, loss of income) at 5.3%
      and unemployment insurance (ALV) at 1.1% up to CHF 148,200 annual income.
    severity: "info"

  - id: "married_filing"
    title: "Married Filing Status"
    body: |
      Switzerland taxes married couples jointly. The combined income is taxed together,
      which may result in higher or lower effective rates depending on income distribution.
    severity: "info"

inputs:
  gross_annual:
    type: number
    required: true
    min: 0
    label: "Annual Gross Salary"
    description: "Your total yearly salary before any deductions (in CHF)"

  filing_status:
    type: enum
    required: true
    default: "single"
    label: "Filing Status"
    options:
      single:
        label: "Single"
        description: "Unmarried individual"
      married:
        label: "Married"
        description: "Married or in registered partnership (joint taxation)"

  region_level_1:
    type: enum
    required: false
    label: "Canton"
    description: "Select your canton of residence (optional - affects cantonal/municipal tax estimates)"
    options:
      zurich:
        label: "Zürich"
      bern:
        label: "Bern"
      geneva:
        label: "Geneva"
      basel_stadt:
        label: "Basel-Stadt"
      vaud:
        label: "Vaud"
      zug:
        label: "Zug (lowest tax)"
      schwyz:
        label: "Schwyz"
      neuchatel:
        label: "Neuchâtel"

  pillar_3a_contributions:
    type: number
    required: false
    min: 0
    default: 0
    effect: reduces_tax
    label: "Pillar 3a contributions (optional)"
    description: "Voluntary pension savings (3a); deductible up to CHF 7,056 (2024)"

  mortgage_interest_paid:
    type: number
    required: false
    min: 0
    default: 0
    effect: reduces_tax
    label: "Mortgage interest paid (optional)"
    description: "Interest on owner-occupied home loan; cap = investment income + CHF 50,000"

  investment_income_annual:
    type: number
    required: false
    min: 0
    default: 0
    group: mortgage_interest_paid
    label: "Investment income (optional)"
    description: "Taxable investment income; used for mortgage interest deduction cap"

  childcare_costs:
    type: number
    required: false
    min: 0
    default: 0
    effect: reduces_tax
    label: "Childcare costs (optional)"
    description: "Day-care, nanny, etc.; deductible up to CHF 25,000 per child (both parents working)"

  number_of_children_eligible:
    type: number
    required: false
    min: 0
    default: 1
    group: childcare_costs
    label: "Number of children for childcare deduction"
    description: "Children under 14 (or in education) for whom you claim childcare; used for cap"

  medical_expenses:
    type: number
    required: false
    min: 0
    default: 0
    effect: reduces_tax
    label: "Medical expenses (optional)"
    description: "Unreimbursed medical/dental costs; only amount above 5% of income is deductible"

parameters:
  # Social security caps and rates
  unemployment_cap: 148200  # CHF 148,200 annual cap for unemployment insurance

  # Social security contribution rates (employee portion only)
  avs_ai_apg_rate: 0.053    # 5.3% for AVS (old-age), AI (disability), APG (loss of income)
  unemployment_rate: 0.011   # 1.1% for ALV (unemployment insurance) up to cap

  # Standard deductions for federal tax calculation
  business_expense_deduction_single: 3200    # Max CHF 3,200 for commuting/professional expenses (federal cap)
  business_expense_deduction_married: 3200   # Same cap for married
  insurance_premium_deduction_single: 1800   # CHF 1,800 for insurance premiums (federal)
  insurance_premium_deduction_married: 3600  # CHF 3,600 for married couples (federal)
  married_couple_deduction: 2600             # CHF 2,600 federal married deduction

  pillar_3a_cap: 7056
  mortgage_interest_cap_extra: 50000
  childcare_cap_per_child: 25000
  medical_threshold_rate: 0.05

  # Federal income tax brackets for single filers (2024 official rates)
  # Source: https://taxsummaries.pwc.com/switzerland/individual/taxes-on-personal-income
  # Simplified as progressive brackets (without base_amount) to work with current evaluator
  federal_tax_brackets_single:
    - threshold: 0
      rate: 0.0
    - threshold: 15000
      rate: 0.0077
    - threshold: 32800
      rate: 0.0088
    - threshold: 42900
      rate: 0.0264
    - threshold: 57200
      rate: 0.0297
    - threshold: 75200
      rate: 0.0594
    - threshold: 81000
      rate: 0.0660
    - threshold: 107400
      rate: 0.0880
    - threshold: 139600
      rate: 0.1100
    - threshold: 182600
      rate: 0.1320
    - threshold: 783300
      rate: 0.115

  # Federal income tax brackets for married filers (joint taxation) - 2024 estimates
  # Based on 2026 structure with adjustments for 2024
  # Married rates are more favorable with higher thresholds
  federal_tax_brackets_married:
    - threshold: 0
      rate: 0.0
    - threshold: 30000
      rate: 0.0100
    - threshold: 50000
      rate: 0.0200
    - threshold: 58000
      rate: 0.0300
    - threshold: 75000
      rate: 0.0400
    - threshold: 90000
      rate: 0.0500
    - threshold: 103000
      rate: 0.0600
    - threshold: 114000
      rate: 0.0660
    - threshold: 124000
      rate: 0.0880
    - threshold: 163000
      rate: 0.1100
    - threshold: 203000
      rate: 0.1320
    - threshold: 895000
      rate: 0.1150

  # Cantonal/municipal effective tax rates (combined estimates as % of gross income)
  # Cantonal/municipal tax brackets (progressive marginal rates by canton and filing status)
  # Same rate tiers as before but structured as brackets so rates apply only to marginal income,
  # avoiding discontinuous cliffs at thresholds (e.g. a rate jump from 5% to 7% on ALL income).
  # Thresholds: 0 / CHF 50,000 / CHF 150,000
  zurich_single_brackets:
    - { threshold: 0, rate: 0.08 }
    - { threshold: 50000, rate: 0.12 }
    - { threshold: 150000, rate: 0.15 }
  zurich_married_brackets:
    - { threshold: 0, rate: 0.06 }
    - { threshold: 50000, rate: 0.10 }
    - { threshold: 150000, rate: 0.13 }
  bern_single_brackets:
    - { threshold: 0, rate: 0.09 }
    - { threshold: 50000, rate: 0.14 }
    - { threshold: 150000, rate: 0.17 }
  bern_married_brackets:
    - { threshold: 0, rate: 0.07 }
    - { threshold: 50000, rate: 0.12 }
    - { threshold: 150000, rate: 0.15 }
  geneva_single_brackets:
    - { threshold: 0, rate: 0.10 }
    - { threshold: 50000, rate: 0.15 }
    - { threshold: 150000, rate: 0.18 }
  geneva_married_brackets:
    - { threshold: 0, rate: 0.08 }
    - { threshold: 50000, rate: 0.13 }
    - { threshold: 150000, rate: 0.16 }
  basel_stadt_single_brackets:
    - { threshold: 0, rate: 0.09 }
    - { threshold: 50000, rate: 0.13 }
    - { threshold: 150000, rate: 0.16 }
  basel_stadt_married_brackets:
    - { threshold: 0, rate: 0.07 }
    - { threshold: 50000, rate: 0.11 }
    - { threshold: 150000, rate: 0.14 }
  vaud_single_brackets:
    - { threshold: 0, rate: 0.10 }
    - { threshold: 50000, rate: 0.14 }
    - { threshold: 150000, rate: 0.17 }
  vaud_married_brackets:
    - { threshold: 0, rate: 0.08 }
    - { threshold: 50000, rate: 0.12 }
    - { threshold: 150000, rate: 0.15 }
  zug_single_brackets:
    - { threshold: 0, rate: 0.04 }
    - { threshold: 50000, rate: 0.07 }
    - { threshold: 150000, rate: 0.09 }
  zug_married_brackets:
    - { threshold: 0, rate: 0.03 }
    - { threshold: 50000, rate: 0.05 }
    - { threshold: 150000, rate: 0.07 }
  schwyz_single_brackets:
    - { threshold: 0, rate: 0.05 }
    - { threshold: 50000, rate: 0.08 }
    - { threshold: 150000, rate: 0.10 }
  schwyz_married_brackets:
    - { threshold: 0, rate: 0.04 }
    - { threshold: 50000, rate: 0.06 }
    - { threshold: 150000, rate: 0.08 }
  neuchatel_single_brackets:
    - { threshold: 0, rate: 0.12 }
    - { threshold: 50000, rate: 0.17 }
    - { threshold: 150000, rate: 0.20 }
  neuchatel_married_brackets:
    - { threshold: 0, rate: 0.10 }
    - { threshold: 50000, rate: 0.15 }
    - { threshold: 150000, rate: 0.18 }

calculations:
  # Social security contributions
  - id: avs_ai_apg_contribution
    type: percent_of
    base: "@gross_annual"
    rate: "$avs_ai_apg_rate"
    category: contribution
    label: "AVS/AI/APG Contributions"
    description: "Old-age, disability, and loss of income insurance (5.3%)"

  - id: unemployment_base
    type: min
    values:
      - "@gross_annual"
      - "$unemployment_cap"

  - id: unemployment_contribution
    type: percent_of
    base: "$unemployment_base"
    rate: "$unemployment_rate"
    category: contribution
    label: "Unemployment Insurance (ALV)"
    description: "Unemployment insurance contribution (1.1% up to CHF 148,200)"

  - id: total_social_contributions
    type: sum
    values:
      - "$avs_ai_apg_contribution"
      - "$unemployment_contribution"

  # Standard deductions for federal tax calculation
  - id: business_expense_deduction
    type: switch
    on: "@filing_status"
    cases:
      single: "$business_expense_deduction_single"
      married: "$business_expense_deduction_married"
      _: "$business_expense_deduction_single"

  - id: insurance_premium_deduction
    type: switch
    on: "@filing_status"
    cases:
      single: "$insurance_premium_deduction_single"
      married: "$insurance_premium_deduction_married"
      _: "$insurance_premium_deduction_single"

  - id: married_deduction
    type: switch
    on: "@filing_status"
    cases:
      married: "$married_couple_deduction"
      _: 0

  - id: total_standard_deductions
    type: sum
    values:
      - "$business_expense_deduction"
      - "$insurance_premium_deduction"
      - "$married_deduction"

  - id: income_after_social
    type: sub
    values:
      - "@gross_annual"
      - "$total_social_contributions"

  - id: income_before_optional_deductions
    type: sub
    values:
      - "$income_after_social"
      - "$total_standard_deductions"

  - id: pillar_3a_deduction
    type: deduction
    amount: "@pillar_3a_contributions"
    cap: "$pillar_3a_cap"
    category: deduction
    label: "Pillar 3a"

  - id: mortgage_interest_cap
    type: sum
    values:
      - "@investment_income_annual"
      - "$mortgage_interest_cap_extra"

  - id: mortgage_interest_deduction
    type: deduction
    amount: "@mortgage_interest_paid"
    cap: "$mortgage_interest_cap"
    category: deduction
    label: "Mortgage interest"

  - id: childcare_cap
    type: mul
    values:
      - "$childcare_cap_per_child"
      - "@number_of_children_eligible"

  - id: childcare_deduction
    type: deduction
    amount: "@childcare_costs"
    cap: "$childcare_cap"
    category: deduction
    label: "Childcare"

  - id: optional_deductions_before_medical
    type: sum
    values:
      - "$pillar_3a_deduction"
      - "$mortgage_interest_deduction"
      - "$childcare_deduction"

  - id: income_after_non_medical_optionals
    type: sub
    values:
      - "$income_before_optional_deductions"
      - "$optional_deductions_before_medical"

  - id: medical_threshold
    type: mul
    values:
      - "$income_after_non_medical_optionals"
      - "$medical_threshold_rate"

  - id: medical_deduction
    type: deduction
    amount: "@medical_expenses"
    threshold:
      amount: "$medical_threshold"
      mode: "above"
    category: deduction
    label: "Medical expenses"

  - id: total_optional_deductions
    type: sum
    values:
      - "$pillar_3a_deduction"
      - "$mortgage_interest_deduction"
      - "$childcare_deduction"
      - "$medical_deduction"

  - id: taxable_income_federal
    type: sub
    values:
      - "$income_before_optional_deductions"
      - "$total_optional_deductions"

  # Federal income tax (applied to taxable income, not gross)
  - id: federal_tax_brackets
    type: switch
    on: "@filing_status"
    cases:
      single: "$federal_tax_brackets_single"
      married: "$federal_tax_brackets_married"

  - id: federal_income_tax
    type: bracket_tax
    base: "$taxable_income_federal"
    brackets: "$federal_tax_brackets"
    category: income_tax
    label: "Federal Income Tax"
    description: "Swiss direct federal tax (progressive up to 11.5%)"

  # Cantonal/municipal tax estimation
  # Cantonal/municipal tax - progressive brackets to avoid cliffs at thresholds
  - id: cantonal_brackets
    type: switch
    on: "@region_level_1"
    cases:
      zurich:
        type: switch
        on: "@filing_status"
        cases:
          single: "$zurich_single_brackets"
          married: "$zurich_married_brackets"
          _: "$zurich_single_brackets"
      bern:
        type: switch
        on: "@filing_status"
        cases:
          single: "$bern_single_brackets"
          married: "$bern_married_brackets"
          _: "$bern_single_brackets"
      geneva:
        type: switch
        on: "@filing_status"
        cases:
          single: "$geneva_single_brackets"
          married: "$geneva_married_brackets"
          _: "$geneva_single_brackets"
      basel_stadt:
        type: switch
        on: "@filing_status"
        cases:
          single: "$basel_stadt_single_brackets"
          married: "$basel_stadt_married_brackets"
          _: "$basel_stadt_single_brackets"
      vaud:
        type: switch
        on: "@filing_status"
        cases:
          single: "$vaud_single_brackets"
          married: "$vaud_married_brackets"
          _: "$vaud_single_brackets"
      zug:
        type: switch
        on: "@filing_status"
        cases:
          single: "$zug_single_brackets"
          married: "$zug_married_brackets"
          _: "$zug_single_brackets"
      schwyz:
        type: switch
        on: "@filing_status"
        cases:
          single: "$schwyz_single_brackets"
          married: "$schwyz_married_brackets"
          _: "$schwyz_single_brackets"
      neuchatel:
        type: switch
        on: "@filing_status"
        cases:
          single: "$neuchatel_single_brackets"
          married: "$neuchatel_married_brackets"
          _: "$neuchatel_single_brackets"
      _: "$zurich_single_brackets"

  - id: cantonal_municipal_tax
    type: bracket_tax
    base: "@gross_annual"
    brackets: "$cantonal_brackets"
    category: income_tax
    label: "Cantonal & Municipal Tax"
    description: "Combined cantonal and municipal income tax (progressive marginal rates by canton and filing status)"

  # Total taxes and deductions
  - id: total_income_tax
    type: sum
    values:
      - "$federal_income_tax"
      - "$cantonal_municipal_tax"

  - id: total_deductions
    type: sum
    values:
      - "$total_income_tax"
      - "$total_social_contributions"

  - id: net_annual
    type: sub
    values:
      - "@gross_annual"
      - "$total_deductions"

outputs:
  gross: "@gross_annual"
  net: "$net_annual"

  effective_rate:
    type: div
    values:
      - type: sub
        values: ["@gross_annual", "$net_annual"]
      - "@gross_annual"

  breakdown:
    taxes:
      - "$federal_income_tax"
      - "$cantonal_municipal_tax"
    contributions:
      - "$avs_ai_apg_contribution"
      - "$unemployment_contribution"
    deductions:
      - "$pillar_3a_deduction"
      - "$mortgage_interest_deduction"
      - "$childcare_deduction"
      - "$medical_deduction"
