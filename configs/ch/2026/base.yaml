meta:
  country: "ch"
  year: 2026
  currency: "CHF"
  version: "1.0.0"
  sources:
    - url: "https://www.estv.admin.ch/estv/en/home/federal-direct-tax.html"
      description: "Swiss Federal Tax Administration (ESTV) - Direct Federal Tax overview"
      retrieved_at: "2026-03-07"
    - url: "https://swisstaxcalculator.estv.admin.ch/"
      description: "Official ESTV tax calculator for federal, cantonal, and municipal taxes"
      retrieved_at: "2026-03-07"
    - url: "https://bl-api.webcloud7.ch/politik-und-behorden/direktionen/finanz-und-kirchendirektion/steuerverwaltung/steuerzahlungen/tarife-1/tarife-pdf/tarife-direkte-bundessteuer-2026.pdf/@@download/file/Tarife%20Direkte%20Bundessteuer%202026.pdf"
      description: "Official 2026 Swiss Federal Tax Rate Tables (PDF) - direct federal tax brackets"
      retrieved_at: "2026-03-07"
    - url: "https://www.bsv.admin.ch/bsv/de/home/sozialversicherungen/ahv/grundlagen-gesetze/ahv-beitragssaetze.html"
      description: "Official BSV AHV/IV/EO contribution rates (5.3% employee share, unchanged for 2026)"
      retrieved_at: "2026-03-07"
    - url: "https://www.bsv.admin.ch/bsv/de/home/sozialversicherungen/alv/grundlagen-gesetze.html"
      description: "Official BSV ALV (unemployment insurance) rates: 1.1% up to CHF 148,200, then 0.5% solidarity contribution above cap"
      retrieved_at: "2026-03-07"
    - url: "https://www.efd.admin.ch/de/newnsb/VzaAUrhkPx2EPde4a6e3O"
      description: "EFD: Cold progression adjustment for 2026 federal tax brackets (0.1% inflation adjustment)"
      retrieved_at: "2026-03-07"
    - url: "https://www.zh.ch/content/dam/zhweb/bilder-dokumente/themen/steuern-finanzen/steuern/natuerlichepersonen/2026/est-wegleitungen-uj/305%20Wegleitung%20ZH%202026%20UJ%20bf.pdf"
      description: "Canton Zurich 2026 tax return guide - confirms married deduction CHF 2,800"
      retrieved_at: "2026-03-07"
  updated_at: "2026-02-22"
  notes: |
    Switzerland has a complex three-level tax system: federal, cantonal, and municipal.
    Federal tax rates are progressive up to 11.5% maximum.
    Cantonal and municipal taxes vary significantly by location, using multiplier systems.
    This configuration provides federal taxes and example cantonal rates for major cantons.

    Key updates for 2026:
    - Federal tax brackets adjusted for cold progression (0.1% inflation): top threshold for
      singles rises from CHF 783,300 to CHF 793,800; married from CHF 895,000 to CHF 941,200.
    - Married couple deduction (Verheiratetenabzug) increased from CHF 2,600 to CHF 2,800.
    - AHV/IV/EO contribution rate unchanged at 5.3% (employee share).
    - ALV (unemployment insurance) rate unchanged at 1.1% up to CHF 148,200 cap.
    - Standard professional expense deductions (Berufskosten) unchanged due to minimal inflation.
    - Cantonal multipliers carried forward from 2025 data (minimal year-to-year variation).

notices:
  - id: "multi_level_taxation"
    title: "Three-Level Tax System"
    body: |
      Switzerland taxes income at three levels: federal, cantonal (state), and municipal (city).
      Total tax burden varies significantly by location. This calculator includes federal tax
      and representative canton/municipal rates. Your actual tax may differ based on your
      specific municipality within the canton.
    severity: "info"

  - id: "social_security"
    title: "Social Security Contributions"
    body: |
      Swiss employees contribute to AVS/AI/APG (old-age, disability, loss of income) at 5.3%
      and unemployment insurance (ALV) at 1.1% up to CHF 148,200 annual income. Above CHF 148,200,
      a 0.5% solidarity contribution applies to the portion exceeding the cap.
    severity: "info"

  - id: "cantonal_approximation"
    title: "Cantonal Tax Approximation"
    body: |
      Cantonal and municipal taxes in Switzerland are complex and vary by canton and municipality.
      This calculator uses simplified progressive bracket approximations for major cantons. Actual
      taxes depend on your specific municipality's tax multiplier (Steuerfuss) and canton's base
      tariff. For precise calculations, consult your canton's official tax calculator.
    severity: "warning"

  - id: "married_filing"
    title: "Married Filing Status"
    body: |
      Switzerland taxes married couples jointly. The combined income is taxed together,
      which may result in higher or lower effective rates depending on income distribution.
    severity: "info"

inputs:
  gross_annual:
    type: number
    required: true
    min: 0
    label: "Annual Gross Salary"
    description: "Your total yearly salary before any deductions (in CHF)"

  filing_status:
    type: enum
    required: true
    default: "single"
    label: "Filing Status"
    options:
      single:
        label: "Single"
        description: "Unmarried individual"
      married:
        label: "Married"
        description: "Married or in registered partnership (joint taxation)"

  region_level_1:
    type: enum
    required: false
    label: "Canton"
    description: "Select your canton of residence (optional - affects cantonal/municipal tax estimates)"
    options:
      zurich:
        label: "Zürich"
      bern:
        label: "Bern"
      geneva:
        label: "Geneva"
      basel_stadt:
        label: "Basel-Stadt"
      vaud:
        label: "Vaud"
      zug:
        label: "Zug (lowest tax)"
      schwyz:
        label: "Schwyz"
      neuchatel:
        label: "Neuchâtel"

  pillar_3a_contributions:
    type: number
    required: false
    min: 0
    default: 0
    effect: reduces_tax
    label: "Pillar 3a contributions (optional)"
    description: "Voluntary pension savings (3a); deductible up to CHF 7,258 (2026)"

  mortgage_interest_paid:
    type: number
    required: false
    min: 0
    default: 0
    effect: reduces_tax
    label: "Mortgage interest paid (optional)"
    description: "Interest on owner-occupied home loan; cap = investment income + CHF 50,000"

  investment_income_annual:
    type: number
    required: false
    min: 0
    default: 0
    group: mortgage_interest_paid
    label: "Investment income (optional)"
    description: "Taxable investment income; used for mortgage interest deduction cap"

  childcare_costs:
    type: number
    required: false
    min: 0
    default: 0
    effect: reduces_tax
    label: "Childcare costs (optional)"
    description: "Day-care, nanny, etc.; deductible up to CHF 25,000 per child (both parents working)"

  number_of_children_eligible:
    type: number
    required: false
    min: 0
    default: 1
    group: childcare_costs
    label: "Number of children for childcare deduction"
    description: "Children under 14 (or in education) for whom you claim childcare; used for cap"

  medical_expenses:
    type: number
    required: false
    min: 0
    default: 0
    effect: reduces_tax
    label: "Medical expenses (optional)"
    description: "Unreimbursed medical/dental costs; only amount above 5% of income is deductible"

parameters:
  # Social security caps and rates (2026 - unchanged from 2025)
  unemployment_cap: 148200  # CHF 148,200 annual cap for unemployment insurance

  # Social security contribution rates (employee portion only)
  avs_ai_apg_rate: 0.053    # 5.3% for AVS (old-age), AI (disability), APG (loss of income)
  unemployment_rate: 0.011   # 1.1% for ALV (unemployment insurance) up to cap

  # Standard deductions for federal tax calculation (2026)
  # Source: EFD announcement Sept 2025 - deductions unchanged due to 0.1% inflation
  business_expense_deduction_single: 3200    # Max CHF 3,200 for commuting/professional expenses (federal cap)
  business_expense_deduction_married: 3200   # Same cap for married
  insurance_premium_deduction_single: 1800   # CHF 1,800 for insurance premiums (federal)
  insurance_premium_deduction_married: 3600  # CHF 3,600 for married couples (federal)
  married_couple_deduction: 2800             # CHF 2,800 federal married deduction (increased from 2,600 in 2025)

  pillar_3a_cap: 7258
  mortgage_interest_cap_extra: 50000
  childcare_cap_per_child: 25000
  medical_threshold_rate: 0.05

  # Cantonal/municipal tax brackets (progressive rates by income level and canton)
  # Single filers - Zurich
  zurich_single_brackets:
    - threshold: 0
      rate: 0.08
    - threshold: 50000
      rate: 0.12
    - threshold: 150000
      rate: 0.15

  # Married filers - Zurich
  zurich_married_brackets:
    - threshold: 0
      rate: 0.06
    - threshold: 50000
      rate: 0.10
    - threshold: 150000
      rate: 0.13

  # Single filers - Zug
  zug_single_brackets:
    - threshold: 0
      rate: 0.04
    - threshold: 50000
      rate: 0.07
    - threshold: 150000
      rate: 0.09

  # Married filers - Zug
  zug_married_brackets:
    - threshold: 0
      rate: 0.03
    - threshold: 50000
      rate: 0.05
    - threshold: 150000
      rate: 0.07

  # Single filers - Geneva
  geneva_single_brackets:
    - threshold: 0
      rate: 0.10
    - threshold: 50000
      rate: 0.15
    - threshold: 150000
      rate: 0.18

  # Married filers - Geneva
  geneva_married_brackets:
    - threshold: 0
      rate: 0.08
    - threshold: 50000
      rate: 0.13
    - threshold: 150000
      rate: 0.16

  # Single filers - Neuchâtel
  neuchatel_single_brackets:
    - threshold: 0
      rate: 0.12
    - threshold: 50000
      rate: 0.17
    - threshold: 150000
      rate: 0.20

  # Married filers - Neuchâtel
  neuchatel_married_brackets:
    - threshold: 0
      rate: 0.10
    - threshold: 50000
      rate: 0.15
    - threshold: 150000
      rate: 0.18

  # Federal income tax brackets for single filers (2026)
  # Source: Official 2026 Bundessteuer Tarif PDF - adjusted for 0.1% cold progression
  # Top bracket threshold adjusted from 783,300 to 793,800 for singles
  federal_tax_brackets_single:
    - threshold: 0
      rate: 0.0
    - threshold: 15200
      rate: 0.0077
    - threshold: 32800
      rate: 0.0088
    - threshold: 43000
      rate: 0.0264
    - threshold: 57400
      rate: 0.0297
    - threshold: 75400
      rate: 0.0594
    - threshold: 81200
      rate: 0.0660
    - threshold: 107600
      rate: 0.0880
    - threshold: 139900
      rate: 0.1100
    - threshold: 183000
      rate: 0.1320
    - threshold: 793800
      rate: 0.115

  # Federal income tax brackets for married filers (joint taxation) - 2026
  # Top bracket threshold adjusted from 895,000 to 941,200 for married
  federal_tax_brackets_married:
    - threshold: 0
      rate: 0.0
    - threshold: 29900
      rate: 0.0100
    - threshold: 50000
      rate: 0.0200
    - threshold: 58100
      rate: 0.0300
    - threshold: 75200
      rate: 0.0400
    - threshold: 90500
      rate: 0.0500
    - threshold: 103600
      rate: 0.0600
    - threshold: 114500
      rate: 0.0660
    - threshold: 124500
      rate: 0.0880
    - threshold: 163700
      rate: 0.1100
    - threshold: 204000
      rate: 0.1320
    - threshold: 941200
      rate: 0.1150

  # Cantonal/municipal effective tax rates (combined estimates as % of gross income)
  # These are simplified representative rates for comparison
  # Actual rates are complex and vary by municipality within cantons
  # Carried forward from 2025 - canton multipliers rarely change significantly year to year
  cantonal_municipal_rates:
    zurich:
      single_low: 0.08      # For income < CHF 50,000
      single_mid: 0.12      # For income CHF 50,000 - 150,000
      single_high: 0.15     # For income > CHF 150,000
      married_low: 0.06
      married_mid: 0.10
      married_high: 0.13
    bern:
      single_low: 0.09
      single_mid: 0.14
      single_high: 0.17
      married_low: 0.07
      married_mid: 0.12
      married_high: 0.15
    geneva:
      single_low: 0.10
      single_mid: 0.15
      single_high: 0.18
      married_low: 0.08
      married_mid: 0.13
      married_high: 0.16
    basel_stadt:
      single_low: 0.09
      single_mid: 0.13
      single_high: 0.16
      married_low: 0.07
      married_mid: 0.11
      married_high: 0.14
    vaud:
      single_low: 0.10
      single_mid: 0.14
      single_high: 0.17
      married_low: 0.08
      married_mid: 0.12
      married_high: 0.15
    zug:
      single_low: 0.04      # Zug has very low taxes
      single_mid: 0.07
      single_high: 0.09
      married_low: 0.03
      married_mid: 0.05
      married_high: 0.07
    schwyz:
      single_low: 0.05
      single_mid: 0.08
      single_high: 0.10
      married_low: 0.04
      married_mid: 0.06
      married_high: 0.08
    neuchatel:
      single_low: 0.12      # Neuchâtel has high taxes
      single_mid: 0.17
      single_high: 0.20
      married_low: 0.10
      married_mid: 0.15
      married_high: 0.18

calculations:
  # Social security contributions
  - id: avs_ai_apg_contribution
    type: percent_of
    base: "@gross_annual"
    rate: "$avs_ai_apg_rate"
    category: contribution
    label: "AVS/AI/APG Contributions"
    description: "Old-age, disability, and loss of income insurance (5.3%)"

  - id: unemployment_base
    type: min
    values:
      - "@gross_annual"
      - "$unemployment_cap"

  - id: unemployment_contribution_below_cap
    type: percent_of
    base: "$unemployment_base"
    rate: "$unemployment_rate"

  - id: income_above_cap
    type: sub
    values:
      - "@gross_annual"
      - "$unemployment_cap"

  - id: income_above_cap_positive
    type: max
    values:
      - "$income_above_cap"
      - 0

  - id: unemployment_solidarity_contribution
    type: percent_of
    base: "$income_above_cap_positive"
    rate: 0.005

  - id: unemployment_contribution
    type: sum
    values:
      - "$unemployment_contribution_below_cap"
      - "$unemployment_solidarity_contribution"
    category: contribution
    label: "Unemployment Insurance (ALV)"
    description: "Unemployment insurance contribution (1.1% up to CHF 148,200, then 0.5% solidarity contribution above cap)"

  - id: total_social_contributions
    type: sum
    values:
      - "$avs_ai_apg_contribution"
      - "$unemployment_contribution"

  # Standard deductions for federal tax calculation
  - id: business_expense_deduction
    type: switch
    on: "@filing_status"
    cases:
      single: "$business_expense_deduction_single"
      married: "$business_expense_deduction_married"
      _: "$business_expense_deduction_single"

  - id: insurance_premium_deduction
    type: switch
    on: "@filing_status"
    cases:
      single: "$insurance_premium_deduction_single"
      married: "$insurance_premium_deduction_married"
      _: "$insurance_premium_deduction_single"

  - id: married_deduction
    type: switch
    on: "@filing_status"
    cases:
      married: "$married_couple_deduction"
      _: 0

  - id: total_standard_deductions
    type: sum
    values:
      - "$business_expense_deduction"
      - "$insurance_premium_deduction"
      - "$married_deduction"

  - id: income_after_social
    type: sub
    values:
      - "@gross_annual"
      - "$total_social_contributions"

  - id: income_before_optional_deductions
    type: sub
    values:
      - "$income_after_social"
      - "$total_standard_deductions"

  - id: pillar_3a_deduction
    type: deduction
    amount: "@pillar_3a_contributions"
    cap: "$pillar_3a_cap"
    category: deduction
    label: "Pillar 3a"

  - id: mortgage_interest_cap
    type: sum
    values:
      - "@investment_income_annual"
      - "$mortgage_interest_cap_extra"

  - id: mortgage_interest_deduction
    type: deduction
    amount: "@mortgage_interest_paid"
    cap: "$mortgage_interest_cap"
    category: deduction
    label: "Mortgage interest"

  - id: childcare_cap
    type: mul
    values:
      - "$childcare_cap_per_child"
      - "@number_of_children_eligible"

  - id: childcare_deduction
    type: deduction
    amount: "@childcare_costs"
    cap: "$childcare_cap"
    category: deduction
    label: "Childcare"

  - id: optional_deductions_before_medical
    type: sum
    values:
      - "$pillar_3a_deduction"
      - "$mortgage_interest_deduction"
      - "$childcare_deduction"

  - id: income_after_non_medical_optionals
    type: sub
    values:
      - "$income_before_optional_deductions"
      - "$optional_deductions_before_medical"

  - id: medical_threshold
    type: mul
    values:
      - "$income_after_non_medical_optionals"
      - "$medical_threshold_rate"

  - id: medical_deduction
    type: deduction
    amount: "@medical_expenses"
    threshold:
      amount: "$medical_threshold"
      mode: "above"
    category: deduction
    label: "Medical expenses"

  - id: total_optional_deductions
    type: sum
    values:
      - "$pillar_3a_deduction"
      - "$mortgage_interest_deduction"
      - "$childcare_deduction"
      - "$medical_deduction"

  - id: taxable_income_federal
    type: sub
    values:
      - "$income_before_optional_deductions"
      - "$total_optional_deductions"

  # Federal income tax (applied to taxable income, not gross)
  - id: federal_tax_brackets
    type: switch
    on: "@filing_status"
    cases:
      single: "$federal_tax_brackets_single"
      married: "$federal_tax_brackets_married"

  - id: federal_income_tax
    type: bracket_tax
    base: "$taxable_income_federal"
    brackets: "$federal_tax_brackets"
    category: income_tax
    label: "Federal Income Tax"
    description: "Swiss direct federal tax (progressive up to 11.5%)"

  # Cantonal/municipal tax brackets
  - id: cantonal_brackets
    type: switch
    on: "@region_level_1"
    cases:
      zurich:
        type: switch
        on: "@filing_status"
        cases:
          single: "$zurich_single_brackets"
          married: "$zurich_married_brackets"
          _: "$zurich_single_brackets"
      zug:
        type: switch
        on: "@filing_status"
        cases:
          single: "$zug_single_brackets"
          married: "$zug_married_brackets"
          _: "$zug_single_brackets"
      geneva:
        type: switch
        on: "@filing_status"
        cases:
          single: "$geneva_single_brackets"
          married: "$geneva_married_brackets"
          _: "$geneva_single_brackets"
      neuchatel:
        type: switch
        on: "@filing_status"
        cases:
          single: "$neuchatel_single_brackets"
          married: "$neuchatel_married_brackets"
          _: "$neuchatel_single_brackets"
      _: "$zurich_single_brackets"  # Default to Zurich single

  # Cantonal/municipal tax - Progressive brackets for correct marginal rate calculation
  # IMPORTANT: Cantonal taxes are applied progressively (marginal rates), not as flat rate on entire income
  # This avoids discontinuities at bracket thresholds

  - id: cantonal_municipal_tax
    type: bracket_tax
    base: "@gross_annual"
    brackets: "$cantonal_brackets"
    category: income_tax
    label: "Cantonal & Municipal Tax"
    description: "Combined cantonal and municipal income tax (progressive marginal rates by canton and filing status)"

  # Total taxes and deductions
  - id: total_income_tax
    type: sum
    values:
      - "$federal_income_tax"
      - "$cantonal_municipal_tax"

  - id: total_deductions
    type: sum
    values:
      - "$total_income_tax"
      - "$total_social_contributions"

  - id: net_annual
    type: sub
    values:
      - "@gross_annual"
      - "$total_deductions"

outputs:
  gross: "@gross_annual"
  net: "$net_annual"

  effective_rate:
    type: div
    values:
      - type: sub
        values: ["@gross_annual", "$net_annual"]
      - "@gross_annual"

  breakdown:
    taxes:
      - "$federal_income_tax"
      - "$cantonal_municipal_tax"
    contributions:
      - "$avs_ai_apg_contribution"
      - "$unemployment_contribution"
    deductions:
      - "$pillar_3a_deduction"
      - "$mortgage_interest_deduction"
      - "$childcare_deduction"
      - "$medical_deduction"
