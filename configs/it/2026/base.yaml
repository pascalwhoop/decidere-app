meta:
  country: "it"
  year: 2026
  currency: "EUR"
  version: "2.0.0"
  sources:
    - url: "https://www.lexology.com/library/detail.aspx?g=25386883-69ba-499e-a085-f7a5342877ee"
      description: "Budget Law 2026 - IRPEF rate changes (second bracket reduced from 35% to 33%)"
      retrieved_at: "2026-01-22"
    - url: "https://taxing.it/personal-income-tax-irpef-rates/"
      description: "Italian Personal Income Tax Rates for FY 2026"
      retrieved_at: "2026-01-22"
    - url: "https://taxing.it/tax-credit-for-employment-income/"
      description: "Employment Tax Credit (Detrazione lavoro dipendente) - creates no-tax area"
      retrieved_at: "2026-01-23"
    - url: "https://www.mef.gov.it/en/focus/Main-measures-of-the-2026-Budget-Law-00001/"
      description: "Ministry of Economy and Finance - Main measures of the 2026 Budget Law"
      retrieved_at: "2026-01-22"
  updated_at: "2026-01-23"
  notes: |
    Key changes for 2026:
    - Second IRPEF bracket rate reduced from 35% to 33% (€28,001-€50,000)
    - Employment Tax Credit (Detrazione lavoro dipendente) creates no-tax area at €8,500
    - New €1,000 fixed deduction for incomes up to €32,000
    - INPS contribution cuts extended (cuneo fiscale)

notices:
  - id: "salary_input"
    title: "Annual Gross Salary"
    body: "Enter your total annual gross salary before any deductions. This should be your employment income before taxes and social security contributions."
    severity: "info"
  - id: "regional_tax"
    title: "Regional Tax Varies by Location"
    body: "Regional tax (addizionale regionale) rates are set by each region and range from 1.23% to 3.33%. Select your region of residence to apply the correct rate."
    severity: "info"
  - id: "employment_credit"
    title: "Employment Tax Credit Applied"
    body: "Your IRPEF is reduced by the employment tax credit (detrazione lavoro dipendente). This creates a 'no-tax area' for incomes up to €8,500 and reduces the effective tax rate for low to middle incomes."
    severity: "info"
  - id: "2026_tax_cut"
    title: "2026 Tax Relief"
    body: "For 2026: the second IRPEF bracket rate (€28,001-€50,000) is reduced from 35% to 33%, and there's a new €1,000 fixed deduction for incomes up to €32,000."
    severity: "info"
  - id: "cuneo_fiscale"
    title: "Tax Relief for Workers (Cuneo Fiscale 2026)"
    body: "For 2026, the government provides tax relief through: (1) Tax-exempt sums for incomes up to €20,000 (4.8%-7.1% of income), and (2) €1,000 tax deduction for incomes €20,000-€32,000, gradually phasing out to €40,000. This replaces the previous INPS contribution cuts."
    severity: "info"

inputs:
  gross_annual:
    type: number
    required: true
    min: 0
    label: "Annual Gross Salary"
    description: "Your total yearly salary before any deductions"

  region_level_1:
    type: enum
    required: true
    default: "lazio"
    label: "Region of Residence"
    description: "Select your Italian region (determines regional tax rate)"
    options:
      abruzzo:
        label: "Abruzzo"
        description: "Progressive regional tax: 1.67% to 3.33%"
      basilicata:
        label: "Basilicata"
        description: "Regional tax: 1.23%"
      calabria:
        label: "Calabria"
        description: "Regional tax: 2.03%"
      campania:
        label: "Campania"
        description: "Regional tax: 2.33%"
      emilia_romagna:
        label: "Emilia-Romagna"
        description: "Progressive regional tax: 1.33% to 3.33%"
      friuli_venezia_giulia:
        label: "Friuli-Venezia Giulia"
        description: "Regional tax: 1.23%"
      lazio:
        label: "Lazio (Rome)"
        description: "Progressive regional tax: 1.73% to 3.33%"
      liguria:
        label: "Liguria"
        description: "Progressive regional tax: 1.23% to 2.33%"
      lombardia:
        label: "Lombardia (Milan)"
        description: "Progressive regional tax: 1.23% to 3.33%"
      marche:
        label: "Marche"
        description: "Regional tax: 1.73%"
      molise:
        label: "Molise"
        description: "Progressive regional tax: 1.73% to 3.33%"
      piemonte:
        label: "Piemonte (Turin)"
        description: "Progressive regional tax: 1.62% to 3.33%"
      puglia:
        label: "Puglia"
        description: "Progressive regional tax: 1.23% to 3.33%"
      sardegna:
        label: "Sardegna"
        description: "Regional tax: 1.23%"
      sicilia:
        label: "Sicilia"
        description: "Progressive regional tax: 1.23% to 2.33%"
      toscana:
        label: "Toscana (Florence)"
        description: "Progressive regional tax: 1.42% to 3.33%"
      trentino_alto_adige_bolzano:
        label: "Trentino-Alto Adige (Bolzano)"
        description: "Progressive regional tax: 1.23% to 1.73%"
      trentino_alto_adige_trento:
        label: "Trentino-Alto Adige (Trento)"
        description: "Regional tax: 1.23%"
      umbria:
        label: "Umbria"
        description: "Progressive regional tax: 1.73% to 3.33%"
      valle_d_aosta:
        label: "Valle d'Aosta"
        description: "Regional tax: 1.23%"
      veneto:
        label: "Veneto (Venice)"
        description: "Progressive regional tax: 1.23% to 2.33%"

parameters:
  # IRPEF (National Income Tax) brackets for 2026
  # Second bracket reduced from 35% to 33% by Budget Law 2026
  irpef_brackets:
    - { threshold: 0, rate: 0.23 }
    - { threshold: 28000, rate: 0.33 }
    - { threshold: 50000, rate: 0.43 }

  # Employment Tax Credit (Detrazione lavoro dipendente) thresholds
  # This creates the "no-tax area" (area di non tassazione) of €8,500
  employment_credit_max: 1955          # Maximum credit (creates no-tax area at €8,500)
  employment_credit_tier2_base: 1910   # Base for income €15,001-€28,000
  employment_credit_tier2_additional: 1190  # Additional amount that phases out
  employment_credit_tier1_threshold: 15000
  employment_credit_tier2_threshold: 28000
  employment_credit_tier3_threshold: 50000

  # Note: The €65 bonus for incomes €25k-€35k was part of the 2024 system
  # and does not appear in the 2025-2026 tax code

  # INPS (Social Security) - Employee contribution
  # Standard rate is 9.19% for all employees (no contribution cuts in 2026)
  # The cuneo fiscale 2026 operates through TAX relief, not contribution cuts
  inps_employee_rate: 0.0919

  # Cuneo fiscale 2026 - Tax-based relief (NOT contribution reduction)
  # Replaced the old 6-7% INPS cuts with tax-exempt sums and deductions

  # For income up to €20,000: Tax-exempt sum based on employment income
  cuneo_exempt_threshold_1: 8500
  cuneo_exempt_threshold_2: 15000
  cuneo_exempt_threshold_3: 20000
  cuneo_exempt_rate_1: 0.071  # 7.1% for income up to €8,500
  cuneo_exempt_rate_2: 0.053  # 5.3% for income €8,501-€15,000
  cuneo_exempt_rate_3: 0.048  # 4.8% for income €15,001-€20,000

  # For income €20,000-€40,000: Tax deduction (this IS the cuneo fiscale for 2026)
  cuneo_deduction_min: 20000
  cuneo_deduction_fixed_max: 32000  # Fixed €1,000 deduction up to €32k
  cuneo_deduction_phaseout_max: 40000  # Gradual phaseout from €32k to €40k
  cuneo_deduction_amount: 1000  # Fixed deduction amount

  # Municipal tax - average rate (varies by municipality from 0% to 0.9%)
  municipal_tax_rate: 0.008

calculations:
  # Social Security Contributions (INPS) - Employee portion
  # Full 9.19% rate for all employees (cuneo fiscale 2026 operates through tax relief, not contribution cuts)
  - id: inps_employee
    type: percent_of
    base: "@gross_annual"
    rate: "$inps_employee_rate"
    category: contribution
    label: "Social Security (INPS - Employee)"

  # Cuneo fiscale 2026 - Tax-exempt sum for incomes BELOW €20,000
  # This reduces taxable income (replaces the old INPS contribution cuts)
  # NOTE: Must use "lt" (not "lte") for €20k threshold to avoid double-benefit bug
  - id: cuneo_exempt_rate
    type: conditional
    condition:
      type: lte
      left: "@gross_annual"
      right: "$cuneo_exempt_threshold_1"
    then: "$cuneo_exempt_rate_1"
    else:
      type: conditional
      condition:
        type: lte
        left: "@gross_annual"
        right: "$cuneo_exempt_threshold_2"
      then: "$cuneo_exempt_rate_2"
      else:
        type: conditional
        condition:
          type: lt
          left: "@gross_annual"
          right: "$cuneo_exempt_threshold_3"
        then: "$cuneo_exempt_rate_3"
        else: 0

  - id: cuneo_exempt_sum
    type: percent_of
    base: "@gross_annual"
    rate: "$cuneo_exempt_rate"

  # Taxable income for IRPEF = gross - INPS - cuneo exempt sum
  # Note: In 2026, INPS is deducted from taxable income (changed from 2025)
  - id: taxable_income
    type: sub
    values:
      - "@gross_annual"
      - "$inps_employee"
      - "$cuneo_exempt_sum"

  # Gross National Income Tax (IRPEF) before credits
  - id: irpef_gross
    type: bracket_tax
    base: "$taxable_income"
    brackets: "$irpef_brackets"

  # Employment Tax Credit (Detrazione lavoro dipendente)
  # Formula varies by income band:
  # - Up to €15,000: €1,955
  # - €15,001-€28,000: €1,910 + €1,190 × [(€28,000 - income) / €13,000]
  # - €28,001-€50,000: €1,910 × [(€50,000 - income) / €22,000]
  # - Over €50,000: €0
  - id: employment_credit_base
    type: conditional
    condition:
      type: lte
      left: "@gross_annual"
      right: "$employment_credit_tier1_threshold"
    then: "$employment_credit_max"
    else:
      type: conditional
      condition:
        type: lte
        left: "@gross_annual"
        right: "$employment_credit_tier2_threshold"
      then:
        type: sum
        values:
          - "$employment_credit_tier2_base"
          - type: mul
            values:
              - "$employment_credit_tier2_additional"
              - type: div
                values:
                  - type: sub
                    values:
                      - "$employment_credit_tier2_threshold"
                      - "@gross_annual"
                  - 13000
      else:
        type: conditional
        condition:
          type: lte
          left: "@gross_annual"
          right: "$employment_credit_tier3_threshold"
        then:
          type: mul
          values:
            - "$employment_credit_tier2_base"
            - type: div
              values:
                - type: sub
                  values:
                    - "$employment_credit_tier3_threshold"
                    - "@gross_annual"
                - 22000
        else: 0

  # Cuneo fiscale 2026 - Tax deduction for incomes €20,000-€40,000
  - id: cuneo_deduction
    type: conditional
    condition:
      type: lt
      left: "@gross_annual"
      right: "$cuneo_deduction_min"
    then: 0
    else:
      type: conditional
      condition:
        type: lte
        left: "@gross_annual"
        right: "$cuneo_deduction_fixed_max"
      then: "$cuneo_deduction_amount"
      else:
        type: conditional
        condition:
          type: lte
          left: "@gross_annual"
          right: "$cuneo_deduction_phaseout_max"
        then:
          type: mul
          values:
            - "$cuneo_deduction_amount"
            - type: div
              values:
                - type: sub
                  values:
                    - "$cuneo_deduction_phaseout_max"
                    - "@gross_annual"
                - type: sub
                  values:
                    - "$cuneo_deduction_phaseout_max"
                    - "$cuneo_deduction_fixed_max"
        else: 0

  # Total employment tax credit (base + cuneo fiscale deduction)
  # Note: €65 bonus removed - was part of 2024 system only
  - id: employment_credit
    type: sum
    values:
      - "$employment_credit_base"
      - "$cuneo_deduction"

  # Net IRPEF after employment credit (cannot go below 0)
  - id: irpef
    type: max
    values:
      - 0
      - type: sub
        values:
          - "$irpef_gross"
          - "$employment_credit"
    category: income_tax
    label: "IRPEF (National Income Tax)"

  # Employment credit display (as negative value for breakdown)
  - id: employment_credit_display
    type: credit
    amount: "$employment_credit"
    refundable: false
    category: credit
    label: "Employment Tax Credit (Detrazione)"
    description: "Reduces IRPEF based on income level"

  # Regional tax rate based on region selection
  - id: regional_tax_rate
    type: switch
    on: "@region_level_1"
    cases:
      basilicata: 0.0123
      calabria: 0.0203
      campania: 0.0233
      friuli_venezia_giulia: 0.0123
      marche: 0.0173
      sardegna: 0.0123
      trentino_alto_adige_trento: 0.0123
      valle_d_aosta: 0.0123
      abruzzo: 0.0227
      emilia_romagna: 0.0233
      lazio: 0.0253
      liguria: 0.0178
      lombardia: 0.0228
      molise: 0.0266
      piemonte: 0.0248
      puglia: 0.0228
      sicilia: 0.0178
      toscana: 0.0238
      trentino_alto_adige_bolzano: 0.0148
      umbria: 0.0269
      veneto: 0.0178
    default: 0.0173

  # Regional Income Tax (Addizionale Regionale) - applied to taxable income (gross - INPS)
  - id: regional_tax
    type: percent_of
    base: "$taxable_income"
    rate: "$regional_tax_rate"
    category: income_tax
    label: "Regional Tax (Addizionale Regionale)"

  # Municipal Income Tax (Addizionale Comunale) - applied to taxable income (gross - INPS)
  - id: municipal_tax
    type: percent_of
    base: "$taxable_income"
    rate: "$municipal_tax_rate"
    category: income_tax
    label: "Municipal Tax (Addizionale Comunale, ~0.8% avg)"

  # Total Income Tax
  - id: total_income_tax
    type: sum
    values:
      - "$irpef"
      - "$regional_tax"
      - "$municipal_tax"

  # Total Deductions
  - id: total_deductions
    type: sum
    values:
      - "$total_income_tax"
      - "$inps_employee"

  # Net Annual Salary
  - id: net_annual
    type: sub
    values:
      - "@gross_annual"
      - "$total_deductions"

outputs:
  gross: "@gross_annual"
  net: "$net_annual"
  effective_rate:
    type: div
    values:
      - "$total_deductions"
      - "@gross_annual"
  breakdown:
    taxes:
      - "$irpef"
      - "$regional_tax"
      - "$municipal_tax"
    contributions:
      - "$inps_employee"
    credits:
      - "$employment_credit_display"
